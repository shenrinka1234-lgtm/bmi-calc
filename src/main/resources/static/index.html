<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>智慧健康日誌與風險評估系統</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 30px auto; padding: 20px; background-color: #f4f7f6; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        button { background-color: #007bff; color: white; padding: 10px; border: none; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
    </style>
</head>
<body>

    <h2>📋 智慧健康日誌系統</h2>

    <div class="card">
        <input type="number" id="sleepHours" placeholder="睡眠時數">
        <input type="number" id="steps" placeholder="步數">
        <input type="number" id="moodScore" placeholder="心情分數 (1-10)">
        <button onclick="saveLog()">儲存</button>
    </div>

    <div class="card">
        <h3>📈 心情分數趨勢圖</h3>
        <canvas id="healthChart" width="400" height="150"></canvas>
    </div>

    <div class="card">
        <h3>📊 歷史健康日誌紀錄</h3>
        <table>
            <thead><tr><th>ID</th><th>日期</th><th>心情</th><th>風險等級</th><th>操作</th></tr></thead>
            <tbody id="logTableBody"></tbody>
        </table>
    </div>

    <script>
        let myChart; // 定義圖表變數

        window.onload = loadLogs;

        function loadLogs() {
            fetch('/health-logs')
                .then(res => res.json())
                .then(data => {
                    const tbody = document.getElementById('logTableBody');
                    tbody.innerHTML = '';
                    data.forEach(log => {
                        tbody.innerHTML += `<tr><td>${log.id}</td><td>${log.logDate}</td><td>${log.moodScore}</td><td>${log.riskLevel}</td>
                            <td><button onclick="deleteLog(${log.id})">刪除</button></td></tr>`;
                    });
                    renderChart(data); // 抓到資料後自動畫圖
                });
        }

        function renderChart(data) {
            const ctx = document.getElementById('healthChart').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.map(d => d.logDate),
                    datasets: [{ label: '心情分數趨勢', data: data.map(d => d.moodScore), borderColor: '#007bff', fill: false }]
                }
            });
        }

        function saveLog() {
            const payload = { sleepHours: parseFloat(document.getElementById('sleepHours').value), steps: parseInt(document.getElementById('steps').value), moodScore: parseInt(document.getElementById('moodScore').value) };
            fetch('/health-logs', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) })
                .then(() => loadLogs());
        }

        function deleteLog(id) {
            if(confirm('確定刪除？')) {
                fetch('/health-logs/' + id, { method: 'DELETE' }).then(() => loadLogs());
            }
        }
    </script>
</body>
</html>
