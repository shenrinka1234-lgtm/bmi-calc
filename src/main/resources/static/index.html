<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>期末挑戰項目</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; line-height: 1.6; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="number"] { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { background-color: #28a745; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #218838; }
        .result-box { margin-top: 20px; padding: 15px; background-color: #f8f9fa; border-left: 5px solid #007bff; }
    </style>
</head>
<body>

    <h2>期末挑戰系統</h2>
    <p>後端伺服器已成功連線！明天的功能畫面會顯示在這裡。</p>

    <div class="form-group">
        <label for="userInput">測試輸入欄位：</label>
        <input type="text" id="userInput" placeholder="請輸入內容...">
    </div>
    <button onclick="sendData()">送出測試</button>

    <div class="result-box">
        <strong>系統回應結果：</strong>
        <p id="resultText">等待送出...</p>
    </div>

    <script>
        function sendData() {
            const inputVal = document.getElementById('userInput').value;
            
            // 明天會在這裡寫 fetch，把資料傳給 Java 後端
            document.getElementById('resultText').innerText = '你輸入了：' + inputVal + ' (等等明天串接後端邏輯)';
        }
    </script>
</body>
</html>
