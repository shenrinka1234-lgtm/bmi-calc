<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>智慧健康日誌與風險評估系統</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 30px auto; padding: 20px; background-color: #f4f7f6; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input { width: 100%; padding: 8px; margin: 5px 0 15px 0; }
        button { background-color: #007bff; color: white; padding: 10px; border: none; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        /* 風險徽章 */
        .badge { padding: 5px 10px; border-radius: 12px; color: white; font-size: 12px; }
        .low { background-color: #28a745; }
        .medium { background-color: #ffc107; color: black; }
        .high { background-color: #dc3545; }
    </style>
</head>
<body>
    <h2>📋 智慧健康日誌與風險評估系統</h2>
    
    <div class="card">
        <label>睡眠時數 (小時)：</label><input type="number" id="sleep" step="0.1" placeholder="例如：7.5">
        <label>步數：</label><input type="number" id="steps" placeholder="例如：6000">
        <label>心情分數 (1-10)：</label><input type="number" id="mood" placeholder="1-10">
        <button onclick="saveLog()">計算並儲存</button>
    </div>

    <div class="card">
        <h3>📈 心情分數趨勢圖</h3>
        <canvas id="healthChart"></canvas>
    </div>

    <div class="card">
        <h3>📊 歷史數據紀錄</h3>
        <table>
            <thead><tr><th>日期</th><th>睡眠</th><th>步數</th><th>心情</th><th>風險</th><th>操作</th></tr></thead>
            <tbody id="logTableBody"></tbody>
        </table>
    </div>

    <script>
        let myChart;
        window.onload = loadLogs;

        function loadLogs() {
            fetch('/health-logs')
                .then(res => res.json())
                .then(data => {
                    const tbody = document.getElementById('logTableBody');
                    tbody.innerHTML = '';
                    data.forEach(log => {
                        let colorClass = 'low';
                        if (log.riskLevel.includes('中')) colorClass = 'medium';
                        if (log.riskLevel.includes('高')) colorClass = 'high';

                        tbody.innerHTML += `<tr>
                            <td>${log.logDate}</td><td>${log.sleepHours}</td><td>${log.steps}</td><td>${log.moodScore}</td>
                            <td><span class="badge ${colorClass}">${log.riskLevel}</span></td>
                            <td><button onclick="deleteLog(${log.id})">刪除</button></td></tr>`;
                    });
                    renderChart(data); // 同步更新圖表
                });
        }

        function renderChart(data) {
            const ctx = document.getElementById('healthChart').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.map(d => d.logDate),
                    datasets: [{ label: '心情分數', data: data.map(d => d.moodScore), borderColor: '#007bff', fill: false }]
                }
            });
        }

        function saveLog() {
            const payload = { 
                sleepHours: parseFloat(document.getElementById('sleep').value), 
                steps: parseInt(document.getElementById('steps').value), 
                moodScore: parseInt(document.getElementById('mood').value) 
            };
            fetch('/health-logs', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) })
                .then(() => loadLogs());
        }

        function deleteLog(id) {
            if(confirm('確定刪除？')) {
                fetch('/health-logs/' + id, { method: 'DELETE' }).then(() => loadLogs());
            }
        }
    </script>
</body>
</html>
